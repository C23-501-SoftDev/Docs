<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Users</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; background:#F9FAFB; margin:0; color:#111827; }
    .layout { display:flex; height:100vh; }
    .sidebar { width:240px; background:#FFF; border-right:1px solid #E5E7EB; padding:16px; }
    .sidebar h2 { margin-bottom:16px; }
    .sidebar li { padding:8px; border-radius:8px; cursor:pointer; }
    .sidebar li.active { background:#E0E7FF; color:#1D4ED8; }
    .content { flex:1; padding:24px; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }

    .button-primary { background:#2563EB; color:#FFF; border-radius:8px; padding:8px 16px; border:none; cursor:pointer; }
    .button-secondary { background:#E5E7EB; border-radius:8px; padding:6px 12px; border:none; cursor:pointer; }
    .button-danger { background:#DC2626; color:#FFF; border-radius:8px; padding:6px 12px; border:none; cursor:pointer; }

    table { width:100%; border-collapse:collapse; background:#FFF; border:1px solid #E5E7EB; border-radius:12px; overflow:hidden; }
    th, td { padding:12px; border-bottom:1px solid #E5E7EB; }
    .actions button { margin-right:8px; }

    .badge { padding:4px 8px; border-radius:6px; font-size:12px; }
    .active { background:#DCFCE7; color:#166534; }
    .inactive { background:#FEE2E2; color:#991B1B; }

    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.3); display:none; justify-content:center; align-items:center; }
    .modal-content { background:#FFF; padding:24px; border-radius:12px; width:320px; }

    .form-group { margin-bottom:12px; }
    input, select { width:100%; padding:8px; border:1px solid #E5E7EB; border-radius:6px; }

    .toast { position:fixed; bottom:20px; right:20px; background:#16A34A; color:#FFF; padding:12px; border-radius:8px; display:none; }

    .states { margin-bottom:12px; }
    .pagination { margin-top:16px; }
  </style>
</head>
<body>

<div class="layout">

  <div class="sidebar">
    <h2>Admin</h2>
    <ul>
      <li class="active">Users</li>
      <li>Spaces</li>
      <li>Settings</li>
    </ul>
  </div>

  <div class="content">

    <div class="header">
      <h1>Users</h1>
      <button class="button-primary" onclick="openForm()">+ Create User</button>
    </div>

    <!-- States -->
    <div class="states">
      <p id="emptyState" style="display:none;">No users</p>
      <p id="errorState" style="display:none; color:#DC2626;">Error loading users</p>
    </div>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>

        <!-- Normal user -->
        <tr>
          <td>John Doe</td>
          <td>john@example.com</td>
          <td>Admin</td>
          <td><span class="badge active">Active</span></td>
          <td class="actions">
            <button class="button-secondary" onclick="openForm()">Edit</button>
            <button class="button-danger" onclick="openDelete(false)">Delete</button>
          </td>
        </tr>

        <!-- User with restrictions -->
        <tr>
          <td>Alice</td>
          <td>alice@example.com</td>
          <td>Editor</td>
          <td><span class="badge active">Active</span></td>
          <td class="actions">
            <button class="button-secondary" onclick="openForm()">Edit</button>
            <button class="button-secondary" onclick="openDelete(true)">Delete</button>
          </td>
        </tr>

      </tbody>
    </table>

    <!-- Pagination -->
    <div class="pagination">
      <button class="button-secondary">Prev</button>
      <button class="button-secondary">Next</button>
    </div>

  </div>
</div>

<!-- Form Modal -->
<div class="modal" id="formModal">
  <div class="modal-content">
    <h3>User</h3>

    <div class="form-group">
      <input placeholder="Name">
    </div>

    <div class="form-group">
      <input placeholder="Email">
    </div>

    <div class="form-group">
      <select>
        <option>Admin</option>
        <option>Editor</option>
        <option>Reader</option>
      </select>
    </div>

    <div class="form-group">
      <select>
        <option>Active</option>
        <option>Inactive</option>
      </select>
    </div>

    <div class="form-group">
      <input type="password" placeholder="New Password">
    </div>

    <button class="button-primary" onclick="saveUser()">Save</button>
    <button class="button-secondary" onclick="closeForm()">Cancel</button>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal" id="deleteModal">
  <div class="modal-content">
    <p>Are you sure you want to delete?</p>
    <button class="button-secondary" onclick="closeDelete()">Cancel</button>
    <button class="button-danger" onclick="confirmDelete()">Delete</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">Success</div>

<script>
  function openForm() {
    document.getElementById('formModal').style.display = 'flex';
  }

  function closeForm() {
    document.getElementById('formModal').style.display = 'none';
  }

  function saveUser() {
    showToast('User saved');
    closeForm();
  }

  function openDelete(hasRelations) {
    if (hasRelations) {
      alert('Невозможно удалить пользователя: он связан с системой');
      return;
    }
    document.getElementById('deleteModal').style.display = 'flex';
  }

  function closeDelete() {
    document.getElementById('deleteModal').style.display = 'none';
  }

  function confirmDelete() {
    showToast('User deleted');
    closeDelete();
  }

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.innerText = message;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2000);
  }
</script>

</body>
</html>
