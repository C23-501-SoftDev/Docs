<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Settings</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <h2>Navigation</h2>
    <ul>
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="users.html">Users</a></li>
      <li><a href="auth-setup.html">Auth & JWT</a></li>
      <li><a href="spaces.html">Spaces</a></li>
      <li class="active"><a href="settings.html">Settings</a></li>
    </ul>
  </div>

  <div class="content">
    <div class="header">
      <h1>Settings</h1>
    </div>

    <div id="settingsSection">
      <div style="background:#FFF; padding:24px; border-radius:16px; border:1px solid #E5E7EB;">
        <h3>System Settings</h3>
        <div class="form-group">
          <label>Default theme</label>
          <select id="themeSelect">
            <option>Light</option>
            <option>Dark</option>
          </select>
        </div>
        <div class="form-group">
          <label>Default language</label>
          <select>
            <option>English</option>
            <option>Russian</option>
          </select>
        </div>
        <button class="button-primary" id="saveSettingsBtn">Save Settings</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Success</div>

<script>
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2000);
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('saveSettingsBtn')?.addEventListener('click', () => showToast('Settings saved (stub)'));
  });
</script>
</body>
</html>
