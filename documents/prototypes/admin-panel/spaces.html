<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Spaces</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <h2>Navigation</h2>
      <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="users.html">Users</a></li>
        <li><a href="auth-setup.html">Auth & JWT</a></li>
        <li class="active"><a href="spaces.html">Spaces</a></li>
      </ul>
  </div>

  <div class="content" style="display: flex; gap: 24px;">
    <div style="flex: 1;">
      <div class="header">
        <h1>Spaces</h1>
        <button class="button-primary" id="createBtn" onclick="openSpaceModal(false)">+ Create Space</button>
      </div>

      <div class="role-selector-bar">
        <label>Simulate role access:</label>
        <select id="currentRoleSelector">
          <option value="Admin" selected>Admin (full access)</option>
          <option value="Editor">Editor (restricted)</option>
          <option value="Reader">Reader (restricted)</option>
        </select>
        <span style="font-size:12px; color:#6B7280;">(UI elements hide for non-Admin)</span>
      </div>

      <!-- Spaces Section -->
      <div id="spacesSection" class="admin-section">
      <div style="overflow-x:auto;">
        <table id="spacesTable">
          <thead>
            <tr>
              <th data-sort="id">ID</th>
              <th data-sort="name">Name</th>
              <th data-sort="description">Description</th>
              <th data-sort="owner">Owner</th>
              <th data-sort="status">Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="spacesTbody"></tbody>
        </table>
      </div>
      <div class="pagination" id="spacesPagination">
        <button class="button-secondary" id="spacesPrevBtn">Prev</button>
        <span id="spacesPageInfo">Page 1 of 1</span>
        <select id="spacesPerPageSelect">
          <option value="5">5 per page</option>
          <option value="10" selected>10 per page</option>
          <option value="20">20 per page</option>
          <option value="50">50 per page</option>
          <option value="All">All</option>
        </select>
        <button class="button-secondary" id="spacesNextBtn">Next</button>
      </div>
      <div class="states"><p id="spacesEmptyMsg" style="display:none; text-align:center;">No spaces found</p></div>
    </div>
  </div>
  </div>
</div>
<!-- Space Modal -->
<div class="modal" id="spaceModal">
  <div class="modal-content">
    <h3 id="spaceModalTitle">Create Space</h3>
    <div class="form-group"><label>Name *</label><input id="spaceName" placeholder="Space name"></div>
    <div class="form-group"><label>Description</label><textarea id="spaceDesc" rows="2" style="width:100%;"></textarea></div>
    <div class="form-group"><label>Owner (login)</label><input id="spaceOwner" placeholder="Owner login"></div>
    <div class="form-group"><label>Status</label><select id="spaceStatus"><option>Active</option><option>Inactive</option></select></div>
    <div style="display:flex; gap:12px; justify-content:flex-end;">
      <button class="button-primary" id="saveSpaceBtn">Save</button>
      <button class="button-secondary" id="closeSpaceModalBtn">Cancel</button>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal" id="deleteModal">
  <div class="modal-content">
    <p>Are you sure you want to delete this item?</p>
    <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
      <button class="button-secondary" id="cancelDeleteBtn">Cancel</button>
      <button class="button-danger" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Success</div>

<script>
  let spacesData = [
    {id: 1, name: 'Project Alpha', description: 'Development space', owner: 'johndoe', status: 'Active'},
    {id: 2, name: 'Project Beta', description: 'Testing space', owner: 'alice', status: 'Active'},
    {id: 3, name: 'Archive', description: 'Old projects', owner: 'bob', status: 'Inactive'},
    {id: 4, name: 'New Project', description: 'Innovation space', owner: 'charlie', status: 'Active'}
  ];

  let spacesState = { sortKey: 'id', sortDir: 'asc', page: 1, rowsPerPage: 10 };
  let editingSpaceId = null;
  let pendingDeleteId = null;

    function showToast(msg, isError) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast' + (isError ? ' toast-error' : '');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; toast.className = 'toast'; }, 2000);
  }

  function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  function updateAccessUI() {
    const currentRole = document.getElementById('currentRoleSelector').value;
    const section = document.getElementById('spacesSection');
    const createBtn = document.getElementById('createBtn');

    if (currentRole === 'Admin') {
      section.classList.remove('restricted-area');
      createBtn.disabled = false;
    } else {
      section.classList.add('restricted-area');
      createBtn.disabled = true;
    }
  }

  function renderSpaces() {
    let filtered = [...spacesData];
    filtered.sort((a,b) => {
      let valA = a[spacesState.sortKey];
      let valB = b[spacesState.sortKey];
      if (typeof valA === 'string') { valA = valA.toLowerCase(); valB = valB.toLowerCase(); }
      if (valA < valB) return spacesState.sortDir === 'asc' ? -1 : 1;
      if (valA > valB) return spacesState.sortDir === 'asc' ? 1 : -1;
      return 0;
    });

    let perPage = spacesState.rowsPerPage === 'All' ? filtered.length : Number(spacesState.rowsPerPage);
    if (perPage === 0) perPage = filtered.length;
    const totalPages = perPage === 0 ? 1 : Math.ceil(filtered.length / perPage);
    if (spacesState.page > totalPages) spacesState.page = totalPages;
    const start = (spacesState.page - 1) * perPage;
    const pageData = perPage === 0 ? filtered : filtered.slice(start, start + perPage);

    const tbody = document.getElementById('spacesTbody');
    if (pageData.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No spaces</td></tr>';
    } else {
      tbody.innerHTML = pageData.map(s => `
        <tr>
          <td>${s.id}</td>
          <td>${escapeHtml(s.name)}</td>
          <td>${escapeHtml(s.description)}</td>
          <td>${escapeHtml(s.owner)}</td>
          <td><span class="badge ${s.status.toLowerCase()}">${s.status}</span></td>
          <td class="actions">
            <a href="space-permissions.html?id=${s.id}&name=${encodeURIComponent(s.name)}" class="button-secondary" style="text-decoration:none; padding: 6px 12px; min-width: auto;">Permissions</a>
            <button class="button-secondary" onclick="editSpace(${s.id})">Edit</button>
            <button class="button-danger" onclick="deleteSpacePrompt(${s.id})">Delete</button>
          </td>
        </tr>
      `).join('');
    }
    document.getElementById('spacesPageInfo').innerText = `Page ${spacesState.page} of ${totalPages}`;
    document.getElementById('spacesPrevBtn').disabled = spacesState.page <= 1;
    document.getElementById('spacesNextBtn').disabled = spacesState.page >= totalPages;
    document.getElementById('spacesEmptyMsg').style.display = filtered.length === 0 ? 'block' : 'none';

    document.querySelectorAll('#spacesTable th[data-sort]').forEach(th => th.classList.remove('sort-asc','sort-desc'));
    const activeTh = document.querySelector(`#spacesTable th[data-sort="${spacesState.sortKey}"]`);
    if (activeTh) activeTh.classList.add(`sort-${spacesState.sortDir}`);
  }

  function openSpaceModal(editMode = false) {
    document.getElementById('spaceModal').style.display = 'flex';
    if (!editMode) {
      editingSpaceId = null;
      document.getElementById('spaceModalTitle').innerText = 'Create Space';
      document.getElementById('spaceName').value = '';
      document.getElementById('spaceDesc').value = '';
      document.getElementById('spaceOwner').value = '';
      document.getElementById('spaceStatus').value = 'Active';
    }
  }

    function editSpace(id) {
    const currentRole = document.getElementById('currentRoleSelector').value;
    if (currentRole !== 'Admin') {
      showToast('Only Admin can edit spaces', true);
      return;
    }
    const space = spacesData.find(s => s.id === id);
    if (!space) return;
    editingSpaceId = id;
    document.getElementById('spaceModalTitle').innerText = 'Edit Space';
    document.getElementById('spaceName').value = space.name;
    document.getElementById('spaceDesc').value = space.description;
    document.getElementById('spaceOwner').value = space.owner;
    document.getElementById('spaceStatus').value = space.status;
    document.getElementById('spaceModal').style.display = 'flex';
  }

    function saveSpace() {
    const currentRole = document.getElementById('currentRoleSelector').value;
    if (currentRole !== 'Admin') {
      showToast('Only Admin can modify spaces', true);
      return;
    }
    const name = document.getElementById('spaceName').value.trim();
    const description = document.getElementById('spaceDesc').value.trim();
    const owner = document.getElementById('spaceOwner').value.trim();
    const status = document.getElementById('spaceStatus').value;
    if (!name) { showToast('Space name is required'); return; }
    if (editingSpaceId === null) {
      const newId = spacesData.length ? Math.max(...spacesData.map(s => s.id)) + 1 : 5;
      spacesData.push({ id: newId, name, description, owner: owner || 'system', status });
      showToast(`Space "${name}" created`);
    } else {
      const idx = spacesData.findIndex(s => s.id === editingSpaceId);
      if (idx !== -1) {
        spacesData[idx] = { ...spacesData[idx], name, description, owner: owner || spacesData[idx].owner, status };
        showToast(`Space "${name}" updated`);
      }
    }
    document.getElementById('spaceModal').style.display = 'none';
    renderSpaces();
  }

    function deleteSpacePrompt(id) {
    const currentRole = document.getElementById('currentRoleSelector').value;
    if (currentRole !== 'Admin') {
      showToast('Only Admin can delete spaces', true);
      return;
    }
    pendingDeleteId = id;
    document.getElementById('deleteModal').style.display = 'flex';
  }

  function confirmDelete() {
    const idx = spacesData.findIndex(s => s.id === pendingDeleteId);
    if (idx !== -1) {
      spacesData.splice(idx, 1);
      showToast('Space deleted');
      let filtered = spacesData;
      let perPage = spacesState.rowsPerPage === 'All' ? filtered.length : Number(spacesState.rowsPerPage);
      let totalPages = perPage === 0 ? 1 : Math.ceil(filtered.length / perPage);
      if (spacesState.page > totalPages) spacesState.page = totalPages;
      renderSpaces();
    }
    document.getElementById('deleteModal').style.display = 'none';
  }

  document.addEventListener('DOMContentLoaded', () => {
    updateAccessUI();
    renderSpaces();
    document.querySelectorAll('#spacesTable th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const key = th.dataset.sort;
        if (spacesState.sortKey === key) spacesState.sortDir = spacesState.sortDir === 'asc' ? 'desc' : 'asc';
        else { spacesState.sortKey = key; spacesState.sortDir = 'asc'; }
        renderSpaces();
      });
    });
    document.getElementById('spacesPrevBtn').addEventListener('click', () => { if(spacesState.page > 1) { spacesState.page--; renderSpaces(); } });
    document.getElementById('spacesNextBtn').addEventListener('click', () => {
      let perPage = spacesState.rowsPerPage === 'All' ? spacesData.length : Number(spacesState.rowsPerPage);
      let totalPages = perPage === 0 ? 1 : Math.ceil(spacesData.length / perPage);
      if(spacesState.page < totalPages) { spacesState.page++; renderSpaces(); }
    });
    document.getElementById('spacesPerPageSelect').addEventListener('change', (e) => {
      spacesState.rowsPerPage = e.target.value;
      spacesState.page = 1;
      renderSpaces();
    });
        document.getElementById('closeSpaceModalBtn').addEventListener('click', () => document.getElementById('spaceModal').style.display = 'none');
    document.getElementById('saveSpaceBtn').addEventListener('click', saveSpace);
    document.getElementById('currentRoleSelector').addEventListener('change', updateAccessUI);
    document.getElementById('cancelDeleteBtn').addEventListener('click', () => document.getElementById('deleteModal').style.display = 'none');
    document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);
    window.onclick = (e) => { if(e.target.classList.contains('modal')) e.target.style.display = 'none'; };
  });
</script>
</body>
</html>
