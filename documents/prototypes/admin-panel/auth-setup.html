<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - User & JWT Auth</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <h2>Navigation</h2>
    <ul>
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="users.html">Users</a></li>
      <li class="active"><a href="auth-setup.html">Auth & JWT</a></li>
      <li><a href="spaces.html">Spaces</a></li>
      <li><a href="settings.html">Settings</a></li>
    </ul>
  </div>
  <div class="content">
    <div class="header">
      <h1>User & JWT Configuration</h1>
      <button class="button-primary" onclick="openUserModal()">+ Create User</button>
    </div>
    <div class="rbac-grid">
      <div class="card">
        <h3>JWT Auth Settings</h3>
        <div class="form-group">
          <label>Secret Key (HS256)</label>
          <input type="text" id="jwtSecret" placeholder="••••••••••••••">
      </div>
      <div class="form-group">
          <label>Token Expiration (min)</label>
          <input type="number" id="jwtExp" value="60">
        </div>
        <button class="button-secondary" id="saveJwtBtn">Save Config</button>
      </div>
    </div>
  </div>

<div class="modal" id="userModal">
  <div class="modal-content">
    <h3>Create User</h3>
    <div class="form-group">
      <label>Login *</label>
      <input type="text" id="userLogin" placeholder="Enter login">
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="userEmail" placeholder="user@example.com">
    </div>
    <div class="form-group">
      <label>Password *</label>
      <input type="password" id="userPassword" placeholder="••••••••">
    </div>
    <div style="display:flex; gap:12px; justify-content:flex-end;">
      <button class="button-primary" id="saveUserBtn">Save</button>
      <button class="button-secondary" id="closeUserModalBtn">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Saved successfully</div>
<script>
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2000);
  }

  function openUserModal() { document.getElementById('userModal').style.display = 'flex'; }
  document.getElementById('closeUserModalBtn').addEventListener('click', () => {
    document.getElementById('userModal').style.display = 'none';
  });

  document.getElementById('saveUserBtn').addEventListener('click', () => {
    // В реальном приложении здесь был бы API вызов
    document.getElementById('userModal').style.display = 'none';
    showToast('User created successfully');
  });

  document.getElementById('saveJwtBtn').addEventListener('click', () => showToast('Configuration updated'));
  window.onclick = (e) => { if(e.target.classList.contains('modal')) e.target.style.display = 'none'; };
</script>
</body>
</html>
